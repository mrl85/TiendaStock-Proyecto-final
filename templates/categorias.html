{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-4">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">Nueva categoria</div>
      <div class="card-body">
        <form method="post" action="/web/categorias">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" name="nombre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripcion</label>
            <textarea class="form-control" name="descripcion" rows="3"></textarea>
          </div>
          <button class="btn btn-primary w-100" type="submit">Guardar</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">Listado de categorias</div>
      <div class="table-responsive">
        <table class="table mb-0 align-middle">
          <thead><tr><th>ID</th><th>Nombre</th><th>Descripcion</th><th></th></tr></thead>
          <tbody>
          {% for c in categorias %}
            <tr>
              <td>{{ c.id_categoria }}</td>
              <td>{{ c.nombre }}</td>
              <td>{{ c.descripcion }}</td>
              <td class="text-end">
                <form method="post" action="/web/categorias/{{ c.id_categoria }}/eliminar" onsubmit="return confirm('Eliminar categoria?');">
                  <button class="btn btn-outline-danger btn-sm" type="submit">Eliminar</button>
                </form>
              </td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
