<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TiendaStock - Proyecto Final</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --azul: #1B4F9B; --azul-2: #4A7EC7; --verde: #1A8754; --fondo: #F5F5F5; }
    body { background: var(--fondo); color: #1f2937; font-family: Arial, Roboto, sans-serif; }
    .navbar { background: var(--azul); }
    .btn-primary { background: var(--azul); border-color: var(--azul); }
    .btn-success { background: var(--verde); border-color: var(--verde); }
    .sidebar { background: #fff; border-right: 1px solid #e5e7eb; min-height: calc(100vh - 57px); }
    .sidebar .nav-link { color: #334155; border-radius: 8px; display: flex; gap: .5rem; align-items: center; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #eaf1fb; color: var(--azul); }
    .metric { border: 0; border-left: 5px solid var(--azul); border-radius: 8px; }
    .chip { border-radius: 999px; padding: .25rem .6rem; font-size: .82rem; font-weight: 700; }
    .chip-normal { background: #dcfce7; color: #166534; }
    .chip-bajo { background: #fef3c7; color: #92400e; }
    .chip-critico, .chip-sin_stock, .chip-por_vencer { background: #fee2e2; color: #991b1b; }
    .table th { color: #475569; font-size: .85rem; text-transform: uppercase; }
    .touch { min-height: 48px; }
    @media (max-width: 767px) {
      .sidebar { min-height: auto; border-right: 0; border-bottom: 1px solid #e5e7eb; }
      .sidebar .nav { flex-direction: row; overflow-x: auto; padding-bottom: .5rem; }
      .sidebar .nav-link { white-space: nowrap; }
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/web">TiendaStock Final</a>
    <span class="navbar-text text-white-50 small">Inventario para tiendas de barrio</span>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <aside class="col-md-3 col-xl-2 sidebar p-3">
      <nav class="nav flex-column gap-1">
        <a class="nav-link" href="/web"><span class="material-icons">dashboard</span>Inicio</a>
        <a class="nav-link" href="/web/productos"><span class="material-icons">inventory_2</span>Productos</a>
        <a class="nav-link" href="/web/movimientos"><span class="material-icons">sync_alt</span>Entradas y salidas</a>
        <a class="nav-link" href="/web/proveedores"><span class="material-icons">local_shipping</span>Proveedores</a>
        <a class="nav-link" href="/web/ordenes"><span class="material-icons">assignment</span>Ordenes</a>
        <a class="nav-link" href="/web/reportes"><span class="material-icons">bar_chart</span>Reportes</a>
        <a class="nav-link" href="/web/categorias"><span class="material-icons">category</span>Categorias</a>
      </nav>
    </aside>
    <main class="col-md-9 col-xl-10 p-3 p-lg-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
</body>
</html>
